# 开发环境：只启动基础服务，前后端本地热重载运行
services:
  postgres:
    image: postgres:16-alpine
    container_name: safety_bms_postgres_dev
    environment:
      POSTGRES_DB: safety_bms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - bms_dev_network

  redis:
    image: redis:7-alpine
    container_name: safety_bms_redis_dev
    ports:
      - "6379:6379"
    networks:
      - bms_dev_network

  minio:
    image: minio/minio:latest
    container_name: safety_bms_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    networks:
      - bms_dev_network

volumes:
  postgres_dev_data:
  minio_dev_data:

networks:
  bms_dev_network:
    driver: bridge
